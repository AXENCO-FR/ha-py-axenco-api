image: python:3.10-alpine

stages:
  - test
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - python -m pip install --upgrade pip
  - pip install build twine toml

test:
  stage: test
  image: python:3.10-alpine
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - python -m pip install --upgrade pip
    - pip install .[dev]
  script:
    - pytest --cov=pyaxencoapi

build:
  stage: build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/

build-publish:
  stage: build
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Setting version to $VERSION"
    - python scripts/set_version.py $VERSION
    - python -m build
  artifacts:
    paths:
      - dist/
  rules:
    - if: $CI_COMMIT_TAG
      when: always

publish:
  stage: publish
  script:
    - twine upload dist/*
  only:
    - tags
 